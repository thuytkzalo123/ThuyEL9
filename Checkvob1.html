<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Sư Từ Vựng AI 🐻</title>
    <!-- Nhúng font chữ Quicksand siêu dễ thương từ Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFF0F5; /* Hồng nhạt baby */
            --card-bg: #FFFFFF;
            --primary: #FFB6C1; /* Hồng pastel */
            --primary-hover: #FF9AA2;
            --text-main: #5D4037; /* Nâu socola */
            --text-muted: #8D6E63;
            --correct: #B5EAD7; /* Xanh ngọc mint */
            --correct-text: #2E7D32;
            --incorrect: #FFDAC1; /* Cam đào */
            --incorrect-text: #C62828;
            --sidebar-width: 280px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(#FFD1DC 1px, transparent 1px);
            background-size: 20px 20px; /* Họa tiết chấm bi mờ */
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: var(--sidebar-width);
            background-color: var(--card-bg);
            border-right: 3px dashed var(--primary);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        
        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #F5F5F5;
        }
        .sidebar-header h2 {
            font-size: 22px;
            color: #FF7B89;
        }

        .question-grid {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            align-content: start;
        }

        .q-btn {
            aspect-ratio: 1;
            border-radius: 10px;
            border: 2px solid #EEE;
            background: #FAFAFA;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .q-btn:hover { border-color: var(--primary); }
        .q-btn.active { border-color: var(--primary); background-color: #FFF5F7; color: #FF7B89; transform: scale(1.1); box-shadow: 0 4px 8px rgba(255,182,193,0.4); }
        .q-btn.correct { background-color: var(--correct); color: var(--correct-text); border-color: var(--correct); }
        .q-btn.incorrect { background-color: var(--incorrect); color: var(--incorrect-text); border-color: var(--incorrect); }

        .submit-section {
            padding: 15px;
            border-top: 2px solid #F5F5F5;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF9AA2 0%, #FFB7B2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255,154,162,0.4);
            transition: transform 0.2s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(255,154,162,0.6); }

        /* --- MAIN CONTENT --- */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-bar {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-toggle {
            display: none;
            background: white;
            border: 2px solid var(--primary);
            border-radius: 10px;
            font-size: 20px;
            padding: 8px 12px;
            cursor: pointer;
            color: var(--primary);
        }

        .learning-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .flashcard {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
        }

        .word-display {
            font-size: 36px;
            font-weight: 700;
            color: #FF7B89;
            margin-bottom: 25px;
            word-wrap: break-word;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #E0E0E0;
            border-radius: 15px;
            background-color: #FAFAFA;
            color: var(--text-main);
            transition: all 0.3s;
            text-align: center;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(255,182,193,0.2);
        }

        .btn-check {
            background-color: #C1E1C1;
            color: #2E7D32;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(193,225,193,0.5);
        }
        .btn-check:hover:not(:disabled) { background-color: #A8D5A8; transform: translateY(-2px); }
        .btn-check:disabled { background-color: #E0E0E0; color: #9E9E9E; cursor: not-allowed; box-shadow: none; }

        .feedback-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 15px;
            font-size: 16px;
            line-height: 1.5;
            display: none;
            animation: popIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        
        .feedback-box.show { display: block; }
        .feedback-box.correct { background-color: var(--correct); color: var(--correct-text); border: 2px solid #A3D9C9; }
        .feedback-box.incorrect { background-color: var(--incorrect); color: var(--incorrect-text); border: 2px solid #F8C8A9; }
        .feedback-box.loading { background-color: #E2F0CB; color: #558B2F; border: 2px dashed #C5E1A5; }

        /* --- MODAL CHẤM ĐIỂM --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(3px);
            z-index: 999; display: none; align-items: center; justify-content: center;
        }
        .score-card {
            background: white; padding: 40px; border-radius: 30px;
            text-align: center; max-width: 400px; width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            animation: popIn 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .score-card h1 { font-size: 60px; color: #FF7B89; margin: 10px 0; }
        .score-card p { font-size: 18px; margin-bottom: 20px; }
        .btn-close {
            background: #F5F5F5; color: var(--text-main); border: none;
            padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            #sidebar {
                position: absolute; left: -100%; top: 0; height: 100%;
                box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            }
            #sidebar.open { left: 0; }
            .flashcard { padding: 30px 20px; }
            .word-display { font-size: 28px; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Hành trình từ vựng 🌟</h2>
        </div>
        <div class="question-grid" id="question-grid">
            <!-- JS sẽ tự động tạo các nút 1->59 vào đây -->
        </div>
        <div class="submit-section">
            <button class="btn-submit" onclick="showScore()">Nộp bài 💯</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-content">
        <div class="top-bar">
            <button class="menu-toggle" onclick="toggleSidebar()">🍔 Mở menu</button>
            <span id="mobile-progress" style="font-weight: bold; color: var(--text-muted);">Câu 1/59</span>
        </div>

        <div class="learning-area">
            <div class="flashcard">
                <div class="word-display" id="word-en">Đang tải...</div>
                
                <div class="input-group">
                    <input type="text" id="word-vi" placeholder="Nhập nghĩa tiếng Việt (vd: địa phương)..." autocomplete="off">
                </div>
                
                <button class="btn-check" id="btn-check" onclick="checkAnswer()">Kiểm tra ✨</button>
                
                <div id="feedback" class="feedback-box"></div>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH CHẤM ĐIỂM -->
    <div id="overlay">
        <div class="score-card">
            <h2>Kết quả của bạn 🎉</h2>
            <h1 id="final-score">10.0</h1>
            <p id="score-detail">Đúng: 0/59 câu</p>
            <p id="score-message" style="color: #FF9AA2; font-weight: bold; margin-bottom: 25px;">Tuyệt vời quá!</p>
            <button class="btn-close" onclick="closeScore()">Quay lại ôn tập</button>
        </div>
    </div>

<script>
    // DÁN LINK GOOGLE APPS SCRIPT MỚI CỦA BẠN VÀO ĐÂY NHÉ:
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbydJ2F0911TLtysznld0oHy7tMC50L6DCwzxrOmYr4vhmaPX8HLWd_qINLG-OUJFl0hcQ/exec";

    // Danh sách 59 từ vựng
    const rawWords = [
        "local", "community", "move", "suburb", "neighbour", "facility", "shopping mall", "look for",
        "bus station", "remind somebody of something", "advice", "get on with someone", "police officer", 
        "garbage collector", "electrician", "firefighter", "delivery person", "artisan", "speciality food", 
        "break down", "take rubbish away", "lantern", "tourist attraction", "pottery", "bamboo bed", 
        "artist", "swimming pool", "handicraft", "house-warming party", "decide", "go out", "pass down", 
        "cut down on", "run out of", "look around", "come back", "find out", "take care of", "seagull", 
        "suitcase", "pedestrian street", "favourite place", "preserve", "shorten", "fragrance", "original", 
        "function", "worldwide", "symbolize", "traditional technique", "consumer", "importance", "hard-working", 
        "responsible", "stop from", "paper fan", "famous for", "sort rubbish", "improve"
    ];

    // Tạo mảng dữ liệu quản lý trạng thái từng câu
    let appData = rawWords.map(word => ({
        en: word,
        status: 'pending', // 'pending', 'correct', 'incorrect'
        userAnswer: '',
        feedbackHtml: ''
    }));

    let currentIndex = 0;

    // 1. Khởi tạo giao diện lưới ở Sidebar
    function renderGrid() {
        const grid = document.getElementById("question-grid");
        grid.innerHTML = "";
        
        appData.forEach((item, index) => {
            const btn = document.createElement("button");
            btn.className = `q-btn ${item.status}`;
            if (index === currentIndex) btn.classList.add("active");
            btn.innerText = index + 1;
            btn.onclick = () => selectQuestion(index);
            grid.appendChild(btn);
        });
    }

    // 2. Chuyển câu hỏi
    function selectQuestion(index) {
        currentIndex = index;
        const currentData = appData[currentIndex];
        
        // Cập nhật UI
        document.getElementById("word-en").innerText = currentData.en;
        document.getElementById("word-vi").value = currentData.userAnswer;
        document.getElementById("mobile-progress").innerText = `Câu ${index + 1}/${appData.length}`;
        
        const feedbackEl = document.getElementById("feedback");
        const checkBtn = document.getElementById("btn-check");

        // Phục hồi trạng thái nếu câu này đã làm
        if (currentData.status !== 'pending') {
            feedbackEl.innerHTML = currentData.feedbackHtml;
            feedbackEl.className = `feedback-box show ${currentData.status}`;
            // Nếu đúng thì không cho sửa nữa, nếu sai vẫn cho sửa
            if(currentData.status === 'correct') {
                document.getElementById("word-vi").disabled = true;
                checkBtn.style.display = "none";
            } else {
                document.getElementById("word-vi").disabled = false;
                checkBtn.style.display = "inline-block";
                checkBtn.disabled = false;
            }
        } else {
            feedbackEl.className = "feedback-box";
            feedbackEl.innerHTML = "";
            document.getElementById("word-vi").disabled = false;
            checkBtn.style.display = "inline-block";
            checkBtn.disabled = false;
        }

        renderGrid();
        
        // Đóng sidebar trên mobile nếu đang mở
        if(window.innerWidth <= 768) {
            document.getElementById("sidebar").classList.remove("open");
        }
        
        // Focus vào ô nhập liệu
        setTimeout(() => document.getElementById("word-vi").focus(), 100);
    }

    // 3. Gọi AI Kiểm tra
    async function checkAnswer() {
        const userInput = document.getElementById("word-vi").value.trim();
        const feedbackEl = document.getElementById("feedback");
        const checkBtn = document.getElementById("btn-check");
        const currentData = appData[currentIndex];

        if (userInput === "") {
            feedbackEl.innerHTML = "Nhập nghĩa vào đã bạn ơi! 🥺";
            feedbackEl.className = "feedback-box show incorrect";
            return;
        }

        // Lưu câu trả lời của user
        currentData.userAnswer = userInput;

        // Trạng thái chờ
        checkBtn.disabled = true;
        document.getElementById("word-vi").disabled = true;
        feedbackEl.innerHTML = "AI đang suy nghĩ... 💭";
        feedbackEl.className = "feedback-box show loading";

        const promptText = `Học sinh dịch cụm từ tiếng Anh "${currentData.en}" sang tiếng Việt là "${userInput}". 
        Hãy đánh giá xem nghĩa này có đúng hoặc sát nghĩa không.
        Chỉ trả về JSON chính xác: {"isCorrect": true/false, "explanation": "Giải thích ngắn gọn bằng tiếng Việt"}`;

        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ prompt: promptText })
            });

            if (!response.ok) throw new Error("Mạng lỗi, không thể kết nối đến máy chủ.");

            const data = await response.json();
            
            // ĐOẠN MÃ MỚI ĐỂ BẮT LỖI TỪ API GOOGLE
            if (data.error) {
                console.error("Lỗi từ Google API:", data.error.message);
                throw new Error("Lỗi API: " + data.error.message);
            }
            
            if (!data.candidates || data.candidates.length === 0) {
                 throw new Error("Lỗi dữ liệu: Máy chủ không trả về kết quả.");
            }

            let aiResponseText = data.candidates[0].content.parts[0].text;
            aiResponseText = aiResponseText.replace(/```json/g, "").replace(/```/g, "").trim();
            const aiResult = JSON.parse(aiResponseText);

            if (aiResult.isCorrect) {
                currentData.status = 'correct';
                currentData.feedbackHtml = `<strong>Chuẩn luôn! 🌟</strong><br>${aiResult.explanation}`;
                feedbackEl.className = "feedback-box show correct";
                checkBtn.style.display = "none"; // Ẩn nút kiểm tra nếu đúng
            } else {
                currentData.status = 'incorrect';
                currentData.feedbackHtml = `<strong>Chưa chính xác 💔</strong><br>${aiResult.explanation}`;
                feedbackEl.className = "feedback-box show incorrect";
                document.getElementById("word-vi").disabled = false; // Mở lại cho sửa
                checkBtn.disabled = false;
            }
            
            feedbackEl.innerHTML = currentData.feedbackHtml;
            renderGrid();

            // Tự động nhảy câu tiếp theo sau 1.5 giây nếu trả lời đúng
            if (aiResult.isCorrect && currentIndex < appData.length - 1) {
                setTimeout(() => selectQuestion(currentIndex + 1), 1500);
            }

        } catch (error) {
            console.error(error);
            feedbackEl.innerHTML = `❌ Úi, có lỗi rồi: ${error.message}`;
            feedbackEl.className = "feedback-box show incorrect";
            checkBtn.disabled = false;
            document.getElementById("word-vi").disabled = false;
        }
    }

    // 4. Chấm điểm & Nộp bài
    function showScore() {
        const total = appData.length;
        const correctCount = appData.filter(item => item.status === 'correct').length;
        
        // Tính thang 10 (Làm tròn 1 chữ số thập phân)
        let score10 = ((correctCount / total) * 10).toFixed(1);
        
        document.getElementById("final-score").innerText = score10;
        document.getElementById("score-detail").innerText = `Bạn đã làm đúng ${correctCount}/${total} từ.`;
        
        let msg = "";
        if (score10 >= 9) msg = "Quá xuất sắc! Bạn là bậc thầy từ vựng! 🏆";
        else if (score10 >= 7) msg = "Rất tốt! Cố gắng thêm chút nữa nhé! 🚀";
        else if (score10 >= 5) msg = "Đạt yêu cầu! Ôn tập thêm các câu sai nhé! 📚";
        else msg = "Đừng nản chí! Hãy làm lại lần nữa nào! 💪";
        
        document.getElementById("score-message").innerText = msg;
        document.getElementById("overlay").style.display = "flex";
    }

    function closeScore() {
        document.getElementById("overlay").style.display = "none";
    }

    // Bật tắt Sidebar trên điện thoại
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
    }

    // Bắt sự kiện Enter
    document.getElementById("word-vi").addEventListener("keypress", function(event) {
        if (event.key === "Enter" && !document.getElementById("btn-check").disabled) {
            checkAnswer();
        }
    });

    // Khởi động trang
    window.onload = () => {
        renderGrid();
        selectQuestion(0);
    };
</script>

</body>
</html>
