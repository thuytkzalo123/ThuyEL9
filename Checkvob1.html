<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Sư Từ Vựng AI 🐻</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #FFF0F5; --card-bg: #FFFFFF; --primary: #FFB6C1; --text-main: #5D4037; --text-muted: #8D6E63; --correct: #B5EAD7; --incorrect: #FFDAC1; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 280px; background: var(--card-bg); border-right: 3px dashed var(--primary); display: flex; flex-direction: column; z-index: 100; transition: 0.3s; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 2px solid #F5F5F5; }
        .question-grid { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; align-content: start; }
        .q-btn { aspect-ratio: 1; border-radius: 10px; border: 2px solid #EEE; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--text-muted); }
        .q-btn.active { border-color: var(--primary); background: #FFF5F7; color: #FF7B89; }
        .q-btn.correct { background: var(--correct); }
        .q-btn.incorrect { background: var(--incorrect); }
        
        /* Main */
        #main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .flashcard { background: white; width: 100%; max-width: 500px; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .word-display { font-size: 36px; font-weight: 700; color: #FF7B89; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #EEE; border-radius: 15px; text-align: center; font-size: 18px; }
        button#btn-check { background: #C1E1C1; border: none; padding: 12px 30px; border-radius: 15px; cursor: pointer; font-weight: bold; color: #2E7D32; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 15px; display: none; }
        
        @media (max-width: 768px) { #sidebar { position: absolute; left: -100%; height: 100%; } #sidebar.open { left: 0; } }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header"><h2>Hành trình từ vựng 🌟</h2></div>
        <div class="question-grid" id="question-grid"></div>
        <div style="padding:15px;"><button style="width:100%; padding:15px; border:none; border-radius:15px; background:var(--primary); color:white; font-weight:bold; cursor:pointer;" onclick="showScore()">Nộp bài 💯</button></div>
    </div>

    <div id="main-content">
        <button style="position:absolute; top:20px; left:20px; padding:10px; border:none; background:white; border-radius:10px; cursor:pointer;" onclick="document.getElementById('sidebar').classList.toggle('open')">🍔</button>
        <div class="flashcard">
            <div id="word-en" class="word-display">...</div>
            <input type="text" id="word-vi" placeholder="Nhập nghĩa tiếng Việt..." autocomplete="off">
            <button id="btn-check" onclick="checkAnswer()">Kiểm tra ✨</button>
            <div id="feedback" class="feedback"></div>
        </div>
    </div>

<script>
    // DÁN LINK GOOGLE APPS SCRIPT CỦA BẠN VÀO DÒNG DƯỚI ĐÂY:
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxe243RycJFYk_WsbZWbFzMs3TzkOQjKWrw_F0c-hquJ__6ZAAxawleWWttVvrJCLv-DQ/exec";

    const rawWords = ["local", "community", "move", "suburb", "neighbour", "facility", "shopping mall", "look for", "bus station", "remind somebody of something", "advice", "get on with someone", "police officer", "garbage collector", "electrician", "firefighter", "delivery person", "artisan", "speciality food", "break down", "take rubbish away", "lantern", "tourist attraction", "pottery", "bamboo bed", "artist", "swimming pool", "handicraft", "house-warming party", "decide", "go out", "pass down", "cut down on", "run out of", "look around", "come back", "find out", "take care of", "seagull", "suitcase", "pedestrian street", "favourite place", "preserve", "shorten", "fragrance", "original", "function", "worldwide", "symbolize", "traditional technique", "consumer", "importance", "hard-working", "responsible", "stop from", "paper fan", "famous for", "sort rubbish", "improve"];
    
    let appData = rawWords.map(word => ({ en: word, status: 'pending', userAnswer: '', feedbackHtml: '' }));
    let currentIndex = 0;

    function renderGrid() {
        const grid = document.getElementById("question-grid");
        grid.innerHTML = "";
        appData.forEach((item, index) => {
            const btn = document.createElement("button");
            btn.className = `q-btn ${item.status} ${index === currentIndex ? 'active' : ''}`;
            btn.innerText = index + 1;
            btn.onclick = () => { currentIndex = index; renderGrid(); selectQuestion(); };
            grid.appendChild(btn);
        });
    }

    function selectQuestion() {
        document.getElementById("word-en").innerText = appData[currentIndex].en;
        document.getElementById("word-vi").value = appData[currentIndex].userAnswer;
        const fb = document.getElementById("feedback");
        fb.style.display = appData[currentIndex].status !== 'pending' ? 'block' : 'none';
        fb.innerHTML = appData[currentIndex].feedbackHtml;
        fb.className = `feedback ${appData[currentIndex].status === 'correct' ? 'correct' : 'incorrect'}`;
    }

async function checkAnswer() {
        const userInput = document.getElementById("word-vi").value.trim();
        if (!userInput) return;
        appData[currentIndex].userAnswer = userInput;
        document.getElementById("btn-check").disabled = true;

        // Prompt được tối ưu: Yêu cầu sửa lỗi chính tả trước khi đánh giá
        const promptText = `Từ tiếng Anh: "${appData[currentIndex].en}". 
        Học sinh dịch là: "${userInput}".
        1. Hãy tự động sửa các lỗi chính tả hoặc lỗi đánh máy (nếu có) trong câu trả lời của học sinh.
        2. Dựa vào từ đã sửa, đánh giá xem nghĩa đó ĐÚNG hay SAI.
        3. Cung cấp 2-3 nghĩa khác của từ đó.
        Trả về đúng định dạng JSON: {"isCorrect": boolean, "correctedWord": "string", "explanation": "string", "synonyms": ["nghĩa 1", "nghĩa 2"]}`;

        try {
            const res = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ prompt: promptText }) });
            const data = await res.json();
            
            const aiText = data.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim();
            const ai = JSON.parse(aiText);
            
            appData[currentIndex].status = ai.isCorrect ? 'correct' : 'incorrect';
            
            // Hiển thị kết quả: Sửa lỗi (nếu có) + Đúng/Sai + Nghĩa khác
            let correctionMsg = (ai.correctedWord.toLowerCase() !== userInput.toLowerCase()) 
                ? `<br><small><i>(Bạn có lỗi chính tả, hệ thống đã sửa thành: <strong>${ai.correctedWord}</strong>)</i></small>` 
                : "";
                
            let feedback = `<strong>Kết quả: ${ai.isCorrect ? 'ĐÚNG ✅' : 'SAI ❌'}</strong>${correctionMsg}<br><br>${ai.explanation}<br><br><strong>Nghĩa khác:</strong> ${ai.synonyms.join(", ")}`;
            
            appData[currentIndex].feedbackHtml = feedback;
            
            renderGrid();
            selectQuestion();
        } catch (e) { alert("Lỗi kết nối AI: " + e.message); }
        document.getElementById("btn-check").disabled = false;
    }

    function showScore() {
        const correct = appData.filter(i => i.status === 'correct').length;
        const score = ((correct / appData.length) * 10).toFixed(1);
        alert(`Bạn đã làm đúng ${correct}/${appData.length} câu.\nĐiểm số: ${score}/10`);
    }

    window.onload = () => { renderGrid(); selectQuestion(); };
</script>
</body>
</html>
