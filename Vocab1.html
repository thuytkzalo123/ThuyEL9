<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Từ Vựng AI 🐻</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFF0F5; --primary: #FFB6C1; --correct: #B5EAD7; --incorrect: #FFDAC1; }
        body { margin: 0; font-family: 'Quicksand', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        /* Sửa lỗi khung nhập liệu bị lệch */
input[type="text"] {
    width: 100%;
    max-width: 400px; /* Giới hạn độ rộng để không bị lệch */
    padding: 15px;
    margin: 20px auto; /* auto giúp căn giữa */
    display: block;    /* Quan trọng để block căn giữa hoạt động */
    border: 2px solid #EEE;
    border-radius: 15px;
    text-align: center;
    font-size: 18px;
    box-sizing: border-box; /* Đảm bảo padding không làm lệch khung */
}

/* Căn chỉnh lại phần phản hồi */
#feedback {
    margin-top: 20px;
    padding: 15px;
    text-align: justify; /* Căn lề hai bên */
    text-justify: inter-word;
    line-height: 1.6;
    display: none;
    border-top: 1px solid #eee;
}

.feedback p { margin: 5px 0; }
       /* Sidebar mặc định cho PC (luôn hiển thị) */
#sidebar {
    width: 280px;
    background: white;
    border-right: 2px solid var(--primary);
    display: flex;
    flex-direction: column;
    z-index: 1000;
    transition: 0.3s;
    position: relative; /* Thay đổi từ fixed sang relative để nó nằm trong dòng chảy trang web */
}

/* Chỉ ẩn Sidebar khi là màn hình nhỏ (Mobile) */
@media (max-width: 768px) {
    #sidebar {
        position: fixed;
        left: -280px;
        height: 100%;
    }
    #sidebar.open {
        left: 0;
    }
}
        
        /* Stats Header */
        .stats-bar { padding: 15px; background: #fff; border-bottom: 1px solid #eee; font-size: 14px; color: #5D4037; }
        .question-grid { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .q-btn { aspect-ratio: 1; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; font-weight: bold; background: white; }
        .q-btn.active { border: 2px solid var(--primary); background: #FFF5F7; }
        .q-btn.correct { background: var(--correct); }
        .q-btn.incorrect { background: var(--incorrect); }

        /* Main Content */
        #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #eee; border-radius: 15px; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div id="sidebar">
    <div style="padding:20px; font-weight:bold; color:var(--primary); text-align:center;">Hành trình từ vựng 🌟</div>
    <div class="stats-bar" id="stats">Đã làm: 0/59 | Đúng: 0 | Điểm: 0.0</div>
    <div class="question-grid" id="grid"></div>
    <button style="margin:15px; padding:15px; border:none; border-radius:15px; background:var(--primary); color:white; font-weight:bold;" onclick="showScore()">Nộp bài 💯</button>
</div>

<div id="main">
    <button style="position:absolute; top:20px; left:20px; padding:10px; border:none; background:white; border-radius:8px;" onclick="toggleSidebar()">🍔</button>
    <div class="card">
        <div id="word-en" style="font-size:30px; font-weight:bold; color:#FF7B89;">...</div>
        <input type="text" id="word-vi" placeholder="Nhập nghĩa..." autocomplete="off">
        <button id="btn-check" style="padding:10px 25px; border-radius:10px; border:none; background:#C1E1C1;" onclick="checkAnswer()">Kiểm tra ✨</button>
        <div id="feedback" style="margin-top:20px; display:none;"></div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxrEr9zPPRXLtTJX5wOu8YtaB9-QxCbex-Hxd8cmr8XWYi0byv2WNKvfKkUs55hoAc0xw/exec";
    const words = ["local", "community", "move", "suburb", "neighbour", "facility", "shopping mall", "look for", "bus station", "remind somebody of something", "advice", "get on with someone", "police officer", "garbage collector", "electrician", "firefighter", "delivery person", "artisan", "speciality food", "break down", "take rubbish away", "lantern", "tourist attraction", "pottery", "bamboo bed", "artist", "swimming pool", "handicraft", "house-warming party", "decide", "go out", "pass down", "cut down on", "run out of", "look around", "come back", "find out", "take care of", "seagull", "suitcase", "pedestrian street", "favourite place", "preserve", "shorten", "fragrance", "original", "function", "worldwide", "symbolize", "traditional technique", "consumer", "importance", "hard-working", "responsible", "stop from", "paper fan", "famous for", "sort rubbish", "improve"];
    
    let data = words.map(en => ({ en, status: 'pending', feedback: '' }));
    let cur = 0;

    function updateUI() {
        const done = data.filter(i => i.status !== 'pending').length;
        const correct = data.filter(i => i.status === 'correct').length;
        document.getElementById('stats').innerText = `Đã làm: ${done}/${data.length} | Đúng: ${correct} | Điểm: ${((correct/data.length)*10).toFixed(1)}`;
        
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        data.forEach((i, idx) => {
            const btn = document.createElement('button');
            btn.className = `q-btn ${i.status} ${idx === cur ? 'active' : ''}`;
            btn.innerText = idx + 1;
            btn.onclick = () => { cur = idx; updateUI(); showWord(); };
            grid.appendChild(btn);
        });
    }

    function showWord() {
        document.getElementById('word-en').innerText = data[cur].en;
        document.getElementById('word-vi').value = '';
        const fb = document.getElementById('feedback');
        fb.style.display = data[cur].status === 'pending' ? 'none' : 'block';
        fb.innerHTML = data[cur].feedback;
        toggleSidebar(false);
    }

    async function checkAnswer() {
        const input = document.getElementById('word-vi').value.trim();
        const prompt = `Từ: "${data[cur].en}". HS dịch: "${input}". Trả JSON: {"isCorrect": boolean, "correctedWord": "string", "synonyms": ["..."]}`;
        const res = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ prompt }) });
        const json = await res.json();
        const ai = JSON.parse(json.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
        
        data[cur].status = ai.isCorrect ? 'correct' : 'incorrect';
        data[cur].feedback = `<strong>${ai.isCorrect ? 'ĐÚNG ✅' : 'SAI ❌'}</strong><br>Sửa lỗi: ${ai.correctedWord}<br>Nghĩa khác: ${ai.synonyms.join(', ')}`;
        updateUI();
        showWord();
    }

    function toggleSidebar(force) {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        const isOpen = force !== undefined ? force : sb.classList.contains('open');
        sb.classList.toggle('open', !isOpen);
        ov.style.display = !isOpen ? 'block' : 'none';
    }

    function showScore() { alert("Điểm của bạn: " + ((data.filter(i => i.status === 'correct').length/data.length)*10).toFixed(1)); }
    window.onload = () => { updateUI(); showWord(); };
</script>
</body>
</html>
