<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Trả Lời Trắc Nghiệm 1 Cột</title>
    <!-- Nhúng Chart.js qua CDN để vẽ biểu đồ năng lực -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px 10px;
        }

        .container {
            max-width: 500px; /* Bóp nhỏ chiều rộng để tối ưu giao diện 1 cột duy nhất */
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #ffffff;
            color: var(--text-main);
            border-radius: 12px;
            border: 2px solid var(--text-main);
        }

        header h1 {
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        header p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Sticky Progress Bar */
        .sticky-progress {
            position: sticky;
            top: 10px;
            z-index: 100;
            background: var(--card-bg);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .progress-bar-container {
            background-color: #e2e8f0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            background: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Thắt chặt cấu trúc 1 cột từ trên xuống dưới (1 đến 40) */
        .sheet-container {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 4px; /* Giảm khoảng cách để tối ưu cuộn trang dọc */
        }

        .row-answer {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px dashed #e2e8f0;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .row-answer.answered {
            background-color: #f8fafc;
        }

        .question-num {
            font-weight: 700;
            width: 45px;
            font-size: 15px;
            color: var(--text-main);
        }

        .options-group {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        /* Tạo khối bong bóng tròn trắc nghiệm */
        .bubble-label {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 1.5px solid #475569;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s ease;
        }

        .bubble-label input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        /* Khi học sinh kích chọn -> Tô đậm vòng tròn */
        .bubble-label:has(input:checked) {
            background-color: #0f172a;
            border-color: #0f172a;
            color: #ffffff;
        }

        /* Trạng thái khóa nút khi xem kết quả đúng / sai */
        .row-answer.show-result .bubble-label {
            pointer-events: none;
        }
        
        /* Tô xanh đáp án đúng */
        .bubble-label.correct-target {
            background-color: var(--success) !important;
            border-color: var(--success) !important;
            color: white !important;
        }
        /* Tô đỏ đáp án học sinh chọn sai */
        .bubble-label.wrong-target {
            background-color: var(--danger) !important;
            border-color: var(--danger) !important;
            color: white !important;
        }

        /* Hiển thị thẻ phân loại kiến thức thu nhỏ góc phải */
        .mini-explanation {
            display: none;
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
            text-align: right;
            max-width: 40%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Actions Button */
        .actions-vessel {
            margin: 25px 0;
            text-align: center;
        }

        .btn-submit {
            background: #0f172a;
            color: white;
            border: 2px solid #0f172a;
            padding: 12px 50px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background: #1e293b;
        }

        /* Result Section */
        .result-section {
            display: none;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .result-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed var(--border-color);
        }

        .score-display {
            font-size: 42px;
            font-weight: 800;
            color: var(--primary-color);
        }

        .chart-container {
            position: relative;
            margin: auto;
            height: 280px;
            width: 100%;
            margin-bottom: 25px;
        }

        .analysis-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            border-left: 4px solid #0f172a;
            padding-left: 8px;
        }

        .category-report-card {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }

        .category-report-header {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 13px;
        }

        .badge-status {
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 4px;
        }
        .badge-excellent { background-color: #d1fae5; color: #065f46; }
        .badge-good { background-color: #dbeafe; color: #1e40af; }
        .badge-weak { background-color: #fee2e2; color: #991b1b; }

        .weak-details {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ANSWER SHEET</h1>
        <p>Phiếu trả lời trắc nghiệm dạng 1 cột (Từ câu 1 đến câu 40)</p>
    </header>

    <!-- Tiến độ làm bài nhịp nhàng -->
    <div class="sticky-progress">
        <div class="progress-info">
            <span id="progressText">Đã chọn: 0/40 câu</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <!-- Khối điền đáp án dạng 1 cột dọc duy nhất -->
    <form id="quizForm">
        <div class="sheet-container" id="sheetGrid">
            <!-- JS tự động render 40 câu theo cấu trúc 1 hàng dọc -->
        </div>
    </form>

    <div class="actions-vessel">
        <button type="button" class="btn-submit" id="submitBtn" onclick="submitQuiz()">Nộp Phiếu Bài Làm</button>
    </div>

    <!-- Bảng phân tích kết quả giữ nguyên nguyên tắc thảo luận -->
    <div class="result-section" id="resultSection">
        <div class="result-header">
            <h2>KẾT QUẢ BÀI LÀM</h2>
            <div class="score-display" id="scoreDisplay">0/40</div>
            <p id="overallFeedback" style="font-size:14px; margin-top:5px; font-weight:500;"></p>
        </div>

        <div class="analysis-title">Biểu Đồ Thống Kê Năng Lực Kiến Thức</div>
        <div class="chart-container">
            <canvas id="skillsChart"></canvas>
        </div>

        <div class="analysis-title">Nhận Xét Phân Loại Chi Tiết</div>
        <div id="detailedAnalysis"></div>
    </div>
</div>

<script>
// Nhập chuẩn 40 câu hỏi và metadata từ AnswerSheet.docx
const answerKey = [
    { id: 1, correct: "C", category: "Phát âm", detail: "Nguyên âm / ɑː / và / æ /" },
    { id: 2, correct: "D", category: "Phát âm", detail: "Nguyên âm / ʌ / và / ɜː /" },
    { id: 3, correct: "A", category: "Kỹ năng giao tiếp", detail: "Sắp xếp hội thoại - Giao tiếp hằng ngày" },
    { id: 4, correct: "A", category: "Kỹ năng giao tiếp", detail: "Sắp xếp hội thoại - Cuộc sống đô thị" },
    { id: 5, correct: "B", category: "Từ vựng", detail: "Chủ đề: Cộng đồng địa phương" },
    { id: 6, correct: "B", category: "Từ vựng", detail: "Chủ đề: Đô thị & Giao thông" },
    { id: 7, correct: "A", category: "Ngữ pháp", detail: "Từ nghi vấn đứng trước Wh- + to V" },
    { id: 8, correct: "C", category: "Ngữ pháp", detail: "Từ nghi vấn đứng trước Wh- + to V" },
    { id: 9, correct: "A", category: "Cụm động từ", detail: "Chủ đề: Hoạt động hằng ngày (come back)" },
    { id: 10, correct: "A", category: "Cụm động từ", detail: "Chủ đề: Làng nghề truyền thống (pass down)" },
    { id: 11, correct: "A", category: "Ngữ pháp", detail: "Cấu trúc so sánh càng... càng... (tính từ ngắn/dài)" },
    { id: 12, correct: "A", category: "Ngữ pháp", detail: "Cấu trúc so sánh càng... càng... (tính từ dài)" },
    { id: 13, correct: "D", category: "Từ vựng", detail: "Chủ đề: Cuộc sống đô thị & Các địa điểm" },
    { id: 14, correct: "C", category: "Cụm động từ", detail: "Chủ đề: Sức khỏe (come down with)" },
    { id: 15, correct: "D", category: "Cụm động từ", detail: "Chủ đề: Môi trường / Đô thị (cut down on)" },
    { id: 16, correct: "D", category: "Ngữ pháp", detail: "Cấu trúc so sánh càng... càng..." },
    { id: 17, correct: "A", category: "Đọc điền từ", detail: "Đọc hiểu ngữ cảnh đoạn văn - Chọn danh từ" },
    { id: 18, correct: "A", category: "Đọc điền từ", detail: "Đọc hiểu ngữ cảnh đoạn văn - Chọn cụm động từ" },
    { id: 19, correct: "D", category: "Đọc điền từ", detail: "Cấu trúc Let's + V-bare" },
    { id: 20, correct: "A", category: "Đọc điền từ", detail: "Thành ngữ/Cụm cố định: get on well with" },
    { id: 21, correct: "C", category: "Đọc điền từ", detail: "Thành ngữ/Cụm cố định: lend a helping hand" },
    { id: 22, correct: "D", category: "Đọc điền từ", detail: "Đọc hiểu ngữ cảnh đoạn văn - Hoạt động cộng đồng" },
    { id: 23, correct: "C", category: "Đọc điền từ", detail: "Đại từ phản thân: enjoy oneself" },
    { id: 24, correct: "A", category: "Đọc điền từ", detail: "Đọc hiểu ngữ cảnh đoạn văn - Chọn động từ" },
    { id: 25, correct: "D", category: "Đọc hiểu văn bản", detail: "Tìm ý chính / Tiêu đề đoạn văn" },
    { id: 26, correct: "A", category: "Đọc hiểu văn bản", detail: "Tìm từ đồng nghĩa (opportunities = chances)" },
    { id: 27, correct: "B", category: "Đọc hiểu văn bản", detail: "Tìm từ thay thế / Quy chiếu (Đại từ This)" },
    { id: 28, correct: "D", category: "Đọc hiểu văn bản", detail: "Tìm từ trái nghĩa (enjoyable >< boring)" },
    { id: 29, correct: "B", category: "Đọc hiểu văn bản", detail: "Tìm thông tin Sai/Không có trong bài (Scanning)" },
    { id: 30, correct: "B", category: "Đọc hiểu văn bản", detail: "Tìm thông tin Chi tiết trong bài (Scanning)" },
    { id: 31, correct: "A", category: "Viết lại câu", detail: "Chuyển đổi câu chứa mệnh đề danh ngữ sang Wh- + to V" },
    { id: 32, correct: "A", category: "Viết lại câu", detail: "Viết lại câu sử dụng cấu trúc so sánh càng... càng..." },
    { id: 33, correct: "D", category: "Viết lại câu", detail: "Viết lại câu sử dụng cấu trúc so sánh càng... càng..." },
    { id: 34, correct: "A", category: "Viết lại câu", detail: "Chuyển đổi ngược từ Wh- + to V sang từ khuyết thiếu" },
    { id: 35, correct: "B", category: "Viết lại câu", detail: "Viết lại câu sử dụng cấu trúc so sánh càng... càng..." },
    { id: 36, correct: "A", category: "Kết hợp câu", detail: "Sử dụng câu điều kiện / Liên từ Unless" },
    { id: 37, correct: "A", category: "Kết hợp câu", detail: "Sử dụng liên từ chỉ nguyên nhân (Because)" },
    { id: 38, correct: "C", category: "Kết hợp câu", detail: "Kết hợp câu sử dụng cấu trúc so sánh càng... càng..." },
    { id: 39, correct: "B", category: "Kết hợp câu", detail: "So sánh càng... càng... (angry -> angrier)" },
    { id: 40, correct: "D", category: "Kết hợp câu", detail: "So sánh càng... càng... (Lựa chọn dạng tính từ & chủ ngữ giả)" }
];

// Tạo 40 hàng theo cấu trúc 1 cột duy nhất tuần tự từ 1 đến 40
function renderAnswerSheet() {
    const grid = document.getElementById('sheetGrid');
    let html = '';

    answerKey.forEach(q => {
        html += `
            <div class="row-answer" id="row_q${q.id}">
                <div class="question-num">${q.id}.</div>
                <div class="options-group">
                    <label class="bubble-label" id="lbl_q${q.id}_A">
                        <input type="radio" name="q${q.id}" value="A" onchange="updateProgress()">A
                    </label>
                    <label class="bubble-label" id="lbl_q${q.id}_B">
                        <input type="radio" name="q${q.id}" value="B" onchange="updateProgress()">B
                    </label>
                    <label class="bubble-label" id="lbl_q${q.id}_C">
                        <input type="radio" name="q${q.id}" value="C" onchange="updateProgress()">C
                    </label>
                    <label class="bubble-label" id="lbl_q${q.id}_D">
                        <input type="radio" name="q${q.id}" value="D" onchange="updateProgress()">D
                    </label>
                </div>
                <div class="mini-explanation" id="mini_exp_${q.id}">${q.category}</div>
            </div>
        `;
    });
    grid.innerHTML = html;
}

function updateProgress() {
    const form = document.getElementById('quizForm');
    let answeredCount = 0;

    answerKey.forEach(q => {
        const selected = form.elements[`q${q.id}`]?.value;
        const row = document.getElementById(`row_q${q.id}`);
        if (selected) {
            answeredCount++;
            row.classList.add('answered');
        }
    });

    const percent = Math.round((answeredCount / answerKey.length) * 100);
    document.getElementById('progressText').innerText = `Đã chọn: ${answeredCount}/${answerKey.length} câu`;
    document.getElementById('progressPercent').innerText = `${percent}%`;
    document.getElementById('progressBar').style.width = `${percent}%`;
}

let skillsChartInstance = null;
function submitQuiz() {
    const form = document.getElementById('quizForm');
    let totalCorrect = 0;
    let stats = {};

    answerKey.forEach(q => {
        const userAnswer = form.elements[`q${q.id}`]?.value;
        const row = document.getElementById(`row_q${q.id}`);
        
        row.classList.add('show-result');
        document.getElementById(`mini_exp_${q.id}`).style.display = "block";

        if (!stats[q.category]) {
            stats[q.category] = { correct: 0, total: 0, mistakes: [] };
        }
        stats[q.category].total++;

        if (userAnswer === q.correct) {
            totalCorrect++;
            stats[q.category].correct++;
            if (userAnswer) {
                document.getElementById(`lbl_q${q.id}_${userAnswer}`).classList.add('correct-target');
            }
        } else {
            stats[q.category].mistakes.push(q.detail);
            if (userAnswer) {
                document.getElementById(`lbl_q${q.id}_${userAnswer}`).classList.add('wrong-target');
            }
            document.getElementById(`lbl_q${q.id}_${q.correct}`).classList.add('correct-target');
        }
    });

    form.querySelectorAll('input[type="radio"]').forEach(el => el.disabled = true);

    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('scoreDisplay').innerText = `${totalCorrect}/${answerKey.length}`;
    
    let scorePct = (totalCorrect / answerKey.length) * 100;
    let feedback = "";
    if(scorePct >= 90) feedback = "Xuất sắc! Bạn nắm rất vững cấu trúc ngữ pháp và từ vựng trong đề.";
    else if(scorePct >= 65) feedback = "Khá tốt! Bạn đạt mức cơ bản nhưng cần luyện tập kĩ phần bị báo yếu.";
    else feedback = "Cần cố gắng nhiều hơn! Hãy ôn lại các phần lý thuyết trọng tâm bên dưới.";
    document.getElementById('overallFeedback').innerText = feedback;

    let detailedHtml = "";
    let labels = [];
    let correctData = [];

    for (let cat in stats) {
        labels.push(cat);
        let pct = Math.round((stats[cat].correct / stats[cat].total) * 100);
        correctData.push(pct);

        let badgeClass = "badge-weak";
        let statusText = "Cần ôn tập";
        if (pct === 100) { badgeClass = "badge-excellent"; statusText = "Thành thạo"; }
        else if (pct >= 70) { badgeClass = "badge-good"; statusText = "Khá/Tốt"; }

        detailedHtml += `
            <div class="category-report-card">
                <div class="category-report-header">
                    <span><strong>${cat}</strong> (Đúng ${stats[cat].correct}/${stats[cat].total})</span>
                    <span class="badge-status ${badgeClass}">${statusText} (${pct}%)</span>
                </div>
                ${stats[cat].mistakes.length > 0 ? `
                    <div class="weak-details">
                        <strong>Trọng tâm bị hổng:</strong> ${[...new Set(stats[cat].mistakes)].join(', ')}
                    </div>
                ` : `<div class="weak-details" style="color:var(--success)">✓ Đạt điểm tối đa phần kiến thức này!</div>`}
            </div>
        `;
    }
    document.getElementById('detailedAnalysis').innerHTML = detailedHtml;

    if (skillsChartInstance) { skillsChartInstance.destroy(); }
    const ctx = document.getElementById('skillsChart').getContext('2d');
    skillsChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Tỷ lệ đúng (%)',
                data: correctData,
                backgroundColor: 'rgba(37, 99, 235, 0.7)',
                borderColor: 'rgba(37, 99, 235, 1)',
                borderWidth: 1,
                borderRadius: 4
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            scales: { x: { min: 0, max: 100 } }
        }
    });

    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
}

window.onload = renderAnswerSheet;
</script>
</body>
</html>
