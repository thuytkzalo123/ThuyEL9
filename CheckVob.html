<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra Từ vựng - AI Chấm điểm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        h2 { 
            color: #2c3e50; 
            margin-bottom: 5px;
        }
        .progress { 
            color: #7f8c8d; 
            font-size: 15px; 
            margin-bottom: 25px;
            font-weight: bold;
        }
        .word-display {
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
            margin: 20px 0;
            padding: 15px;
            background-color: #fdf2f0;
            border-radius: 8px;
        }
        input[type="text"] {
            width: 85%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
            outline: none;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #2ecc71;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin: 5px;
        }
        button:hover { background-color: #27ae60; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        
        #next-btn { background-color: #3498db; }
        #next-btn:hover { background-color: #2980b9; }

        .feedback {
            margin-top: 25px;
            font-size: 16px;
            line-height: 1.6;
            text-align: left;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .feedback.show { display: block; }
        .correct { background-color: #e8f8f5; color: #16a085; border: 1px solid #a3e4d7; }
        .incorrect { background-color: #fdedec; color: #c0392b; border: 1px solid #f5b7b1; }
        .loading { background-color: #ebf5fb; color: #2980b9; border: 1px solid #aed6f1; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Luyện Tập Từ Vựng</h2>
    <div class="progress" id="progress">Câu: 1 / 59</div>
    
    <div class="word-display" id="english-word">Đang tải...</div>
    
    <input type="text" id="vietnamese-input" placeholder="Nhập nghĩa tiếng Việt..." autocomplete="off">
    <br>
    <button id="check-btn" onclick="checkAnswer()">Kiểm tra với AI</button>
    <button onclick="nextQuestion()" id="next-btn" style="display: none;">Câu tiếp theo</button>

    <div id="feedback" class="feedback"></div>
</div>

<script>
    // Mã API của bạn đã được tích hợp
    const API_KEY = "AIzaSyANM35WXfn8ODZ4QPp-yc6jXtRD0lXs9Co"; 

    // Danh sách 59 từ vựng
    const vocabularyData = [
        { "en": "local" }, { "en": "community" }, { "en": "move" }, { "en": "suburb" },
        { "en": "neighbour" }, { "en": "facility" }, { "en": "shopping mall" }, { "en": "look for" },
        { "en": "bus station" }, { "en": "remind somebody of something" }, { "en": "advice" }, 
        { "en": "get on with someone" }, { "en": "police officer" }, { "en": "garbage collector" }, 
        { "en": "electrician" }, { "en": "firefighter" }, { "en": "delivery person" }, { "en": "artisan" }, 
        { "en": "speciality food" }, { "en": "break down" }, { "en": "take rubbish away" }, 
        { "en": "lantern" }, { "en": "tourist attraction" }, { "en": "pottery" }, { "en": "bamboo bed" }, 
        { "en": "artist" }, { "en": "swimming pool" }, { "en": "handicraft" }, { "en": "house-warming party" }, 
        { "en": "decide" }, { "en": "go out" }, { "en": "pass down" }, { "en": "cut down on" }, 
        { "en": "run out of" }, { "en": "look around" }, { "en": "come back" }, { "en": "find out" }, 
        { "en": "take care of" }, { "en": "seagull" }, { "en": "suitcase" }, { "en": "pedestrian street" }, 
        { "en": "favourite place" }, { "en": "preserve" }, { "en": "shorten" }, { "en": "fragrance" }, 
        { "en": "original" }, { "en": "function" }, { "en": "worldwide" }, { "en": "symbolize" }, 
        { "en": "traditional technique" }, { "en": "consumer" }, { "en": "importance" }, 
        { "en": "hard-working" }, { "en": "responsible" }, { "en": "stop from" }, { "en": "paper fan" }, 
        { "en": "famous for" }, { "en": "sort rubbish" }, { "en": "improve" }
    ];

    let currentIndex = 0;

    function loadQuestion() {
        document.getElementById("english-word").innerText = vocabularyData[currentIndex].en;
        document.getElementById("vietnamese-input").value = "";
        
        const feedbackEl = document.getElementById("feedback");
        feedbackEl.className = "feedback"; 
        feedbackEl.innerText = "";
        
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("check-btn").style.display = "inline-block";
        document.getElementById("check-btn").disabled = false;
        
        document.getElementById("progress").innerText = `Câu: ${currentIndex + 1} / ${vocabularyData.length}`;
        document.getElementById("vietnamese-input").focus();
    }

    async function checkAnswer() {
        const userInput = document.getElementById("vietnamese-input").value.trim();
        const feedbackEl = document.getElementById("feedback");
        const checkBtn = document.getElementById("check-btn");

        if (userInput === "") {
            feedbackEl.innerText = "Vui lòng nhập câu trả lời!";
            feedbackEl.className = "feedback incorrect show";
            return;
        }

        const wordEn = vocabularyData[currentIndex].en;

        checkBtn.disabled = true;
        feedbackEl.innerText = "🤖 AI đang kiểm tra...";
        feedbackEl.className = "feedback loading show";

        const promptText = `Học sinh dịch cụm từ tiếng Anh "${wordEn}" sang tiếng Việt là "${userInput}". 
        Hãy đánh giá xem nghĩa này có đúng hoặc sát nghĩa không.
        Chỉ trả về kết quả dưới định dạng JSON chính xác như sau, không có thêm bất kỳ văn bản nào khác:
        {
            "isCorrect": true hoặc false,
            "explanation": "Giải thích ngắn gọn bằng tiếng Việt vì sao đúng hoặc sai."
        }`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });

            if (!response.ok) throw new Error("Lỗi kết nối API");

            const data = await response.json();
            let aiResponseText = data.candidates[0].content.parts[0].text;
            
            aiResponseText = aiResponseText.replace(/```json/g, "").replace(/```/g, "").trim();
            const aiResult = JSON.parse(aiResponseText);

            if (aiResult.isCorrect) {
                feedbackEl.innerHTML = `<strong>Chính xác! 🎉</strong><br>${aiResult.explanation}`;
                feedbackEl.className = "feedback correct show";
            } else {
                feedbackEl.innerHTML = `<strong>Chưa chính xác.</strong><br>${aiResult.explanation}`;
                feedbackEl.className = "feedback incorrect show";
            }

            checkBtn.style.display = "none";
            document.getElementById("next-btn").style.display = "inline-block";

        } catch (error) {
            console.error(error);
            feedbackEl.innerText = "❌ Lỗi kết nối tới AI. Hãy kiểm tra lại kết nối mạng.";
            feedbackEl.className = "feedback incorrect show";
            checkBtn.disabled = false;
        }
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < vocabularyData.length) {
            loadQuestion();
        } else {
            document.getElementById("english-word").innerText = "🎉 Hoàn thành!";
            document.getElementById("vietnamese-input").style.display = "none";
            document.getElementById("check-btn").style.display = "none";
            document.getElementById("next-btn").style.display = "none";
            document.getElementById("progress").style.display = "none";
            
            const feedbackEl = document.getElementById("feedback");
            feedbackEl.innerHTML = "<strong>Tuyệt vời!</strong> Bạn đã hoàn thành toàn bộ bài kiểm tra từ vựng hôm nay.";
            feedbackEl.className = "feedback correct show";
        }
    }

    document.getElementById("vietnamese-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            if (document.getElementById("next-btn").style.display === "none") {
                checkAnswer();
            } else {
                nextQuestion();
            }
        }
    });

    window.onload = loadQuestion;
</script>

</body>
</html>
